<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国产业带产品分布与供应商看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f1923;
            color: #e0e6ed;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e90ff33;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #4fc3f7, #1e90ff, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }
        .header .time {
            font-size: 14px;
            color: #8899aa;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 20px 40px;
            background: #0a1628;
        }
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #1a2744 0%, #0f1d33 100%);
            border: 1px solid #1e90ff33;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #1e90ff, #7c4dff);
        }
        .stat-card .label { font-size: 13px; color: #8899aa; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #4fc3f7; }
        .stat-card .sub { font-size: 12px; color: #66bb6a; margin-top: 4px; }

        /* Main Layout */
        .main { display: flex; gap: 20px; padding: 20px 40px; }
        .left-panel { flex: 1.2; display: flex; flex-direction: column; gap: 20px; }
        .right-panel { flex: 1.8; display: flex; flex-direction: column; gap: 20px; }

        /* Panel */
        .panel {
            background: linear-gradient(135deg, #1a2744 0%, #0f1d33 100%);
            border: 1px solid #1e90ff22;
            border-radius: 12px;
            overflow: hidden;
        }
        .panel-title {
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #4fc3f7;
            border-bottom: 1px solid #1e90ff22;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title .dot {
            width: 8px; height: 8px;
            background: #1e90ff;
            border-radius: 50%;
            box-shadow: 0 0 8px #1e90ff88;
        }
        .panel-body { padding: 16px 20px; }

        /* Map Area */
        .map-container {
            position: relative;
            width: 100%;
            height: 520px;
            background: radial-gradient(ellipse at center, #0f2038 0%, #0a1628 70%);
            overflow: hidden;
        }
        .map-svg { width: 100%; height: 100%; }
        .region-dot {
            cursor: pointer;
            transition: all 0.3s;
        }
        .region-dot:hover { filter: brightness(1.5); }
        .pulse-ring {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0% { r: 6; opacity: 0.8; }
            50% { r: 14; opacity: 0.2; }
            100% { r: 6; opacity: 0.8; }
        }
        .region-label {
            font-size: 10px;
            fill: #b0bec5;
            pointer-events: none;
        }

        /* Industry Belt List */
        .belt-list { max-height: 440px; overflow-y: auto; }
        .belt-list::-webkit-scrollbar { width: 4px; }
        .belt-list::-webkit-scrollbar-thumb { background: #1e90ff44; border-radius: 2px; }
        .belt-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #ffffff08;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
            padding-left: 8px;
            padding-right: 8px;
        }
        .belt-item:hover { background: #1e90ff11; }
        .belt-item.active { background: #1e90ff22; border-left: 3px solid #1e90ff; }
        .belt-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .belt-info { flex: 1; }
        .belt-name { font-size: 14px; font-weight: 600; color: #e0e6ed; }
        .belt-region { font-size: 11px; color: #8899aa; margin-top: 2px; }
        .belt-count {
            font-size: 12px;
            color: #4fc3f7;
            background: #1e90ff15;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* Detail Panel */
        .detail-panel { flex: 1; }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .detail-header h3 { font-size: 18px; color: #fff; }
        .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            border: 1px solid;
        }
        .tag-hot { color: #ef5350; border-color: #ef535044; background: #ef535011; }
        .tag-export { color: #66bb6a; border-color: #66bb6a44; background: #66bb6a11; }
        .tag-scale { color: #ffa726; border-color: #ffa72644; background: #ffa72611; }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .product-card {
            background: #0a162844;
            border: 1px solid #1e90ff15;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            transition: all 0.3s;
        }
        .product-card:hover {
            border-color: #1e90ff55;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px #1e90ff15;
        }
        .product-emoji { font-size: 28px; margin-bottom: 8px; }
        .product-name { font-size: 13px; color: #e0e6ed; font-weight: 500; }
        .product-share {
            font-size: 11px;
            color: #8899aa;
            margin-top: 4px;
        }
        .product-bar {
            height: 3px;
            background: #1e90ff22;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .product-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e90ff, #7c4dff);
            border-radius: 2px;
            transition: width 0.5s;
        }

        /* Supplier Table */
        .supplier-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
        .supplier-table th {
            font-size: 12px;
            color: #8899aa;
            text-align: left;
            padding: 8px 12px;
            font-weight: 500;
        }
        .supplier-table td {
            font-size: 13px;
            padding: 12px;
            background: #0a162866;
            color: #e0e6ed;
        }
        .supplier-table tr td:first-child { border-radius: 8px 0 0 8px; }
        .supplier-table tr td:last-child { border-radius: 0 8px 8px 0; }
        .supplier-name { font-weight: 600; color: #fff; }
        .supplier-type {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }
        .type-factory { background: #1e90ff22; color: #4fc3f7; }
        .type-trader { background: #ffa72622; color: #ffa726; }
        .type-brand { background: #66bb6a22; color: #66bb6a; }
        .rating-stars { color: #ffd54f; font-size: 12px; letter-spacing: 1px; }
        .capacity { color: #4fc3f7; font-weight: 500; }

        /* Bottom Section */
        .bottom-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 0 40px 30px;
        }

        /* Chart Bars */
        .chart-bar-group { display: flex; flex-direction: column; gap: 10px; }
        .chart-bar-item { display: flex; align-items: center; gap: 10px; }
        .chart-bar-label { font-size: 12px; color: #8899aa; width: 80px; text-align: right; flex-shrink: 0; }
        .chart-bar-track {
            flex: 1; height: 22px; background: #0a1628;
            border-radius: 4px; overflow: hidden; position: relative;
        }
        .chart-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 11px;
            color: #fff;
            font-weight: 500;
        }
        .bar-blue { background: linear-gradient(90deg, #1e90ff, #4fc3f7); }
        .bar-purple { background: linear-gradient(90deg, #7c4dff, #b388ff); }
        .bar-green { background: linear-gradient(90deg, #2e7d32, #66bb6a); }
        .bar-orange { background: linear-gradient(90deg, #e65100, #ffa726); }

        /* Pie Chart */
        .pie-container { display: flex; align-items: center; gap: 20px; }
        .pie-svg { width: 140px; height: 140px; }
        .pie-legend { display: flex; flex-direction: column; gap: 8px; }
        .pie-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .pie-legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

        /* Trend List */
        .trend-list { display: flex; flex-direction: column; gap: 8px; }
        .trend-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #0a162844;
            border-radius: 6px;
        }
        .trend-rank {
            width: 22px; height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            margin-right: 10px;
        }
        .rank-1 { background: #ef535033; color: #ef5350; }
        .rank-2 { background: #ffa72633; color: #ffa726; }
        .rank-3 { background: #ffd54f33; color: #ffd54f; }
        .rank-n { background: #1e90ff22; color: #4fc3f7; }
        .trend-name { flex: 1; font-size: 13px; }
        .trend-value { font-size: 13px; color: #66bb6a; font-weight: 600; }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 12px 40px;
            background: #0a1628;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #1e90ff33;
            background: transparent;
            color: #8899aa;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #1e90ff22;
            color: #4fc3f7;
            border-color: #1e90ff;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main { flex-direction: column; }
            .bottom-section { grid-template-columns: 1fr; }
        }

        /* Animation */
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Search */
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0a1628;
            border: 1px solid #1e90ff33;
            border-radius: 8px;
            padding: 6px 12px;
            margin-bottom: 12px;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #e0e6ed;
            font-size: 13px;
            width: 100%;
        }
        .search-box input::placeholder { color: #556677; }
        .search-icon { color: #4fc3f7; font-size: 14px; }
    </style>
</head>

    // ============ INIT ============
    let currentBelt = null;
    let currentFilter = 'all';

    function init() {
        updateTime();
        setInterval(updateTime, 1000);
        renderBeltList(industryBelts);
        renderMap();
        renderRegionBars();
        renderPieChart();
        renderTrendList();
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('currentTime').textContent =
            now.toLocaleDateString('zh-CN') + ' ' + now.toLocaleTimeString('zh-CN') + ' 数据更新';
    }

    // ============ BELT LIST ============
    function renderBeltList(belts) {
        const list = document.getElementById('beltList');
        list.innerHTML = belts.map(b => `
            <div class="belt-item ${currentBelt?.id === b.id ? 'active' : ''}" onclick="selectBelt('${b.id}')">
                <div class="belt-icon" style="background:${b.color}22;color:${b.color}">${b.icon}</div>
                <div class="belt-info">
                    <div class="belt-name">${b.name}</div>
                    <div class="belt-region">${b.province} · ${b.region}</div>
                </div>
                <div class="belt-count">${b.suppliers.length}家</div>
            </div>
        `).join('');
    }

    function searchBelt() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = industryBelts.filter(b => {
            if (currentFilter !== 'all' && b.area !== currentFilter) return false;
            if (!q) return true;
            return b.name.toLowerCase().includes(q) ||
                   b.province.includes(q) ||
                   b.products.some(p => p.name.toLowerCase().includes(q));
        });
        renderBeltList(filtered);
    }

    function filterRegion(area) {
        currentFilter = area;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        searchBelt();
    }

    // ============ MAP ============
    function renderMap() {
        const svg = document.getElementById('mapSvg');
        industryBelts.forEach(b => {
            // Pulse ring
            const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            pulse.setAttribute('cx', b.x);
            pulse.setAttribute('cy', b.y);
            pulse.setAttribute('r', '8');
            pulse.setAttribute('fill', 'none');
            pulse.setAttribute('stroke', b.color);
            pulse.setAttribute('stroke-width', '1.5');
            pulse.setAttribute('opacity', '0.5');
            pulse.classList.add('pulse-ring');
            pulse.style.animationDelay = `${Math.random() * 2}s`;
            svg.appendChild(pulse);

            // Main dot
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', b.x);
            circle.setAttribute('cy', b.y);
            circle.setAttribute('r', Math.max(4, b.suppliers.length * 1.5));
            circle.setAttribute('fill', b.color);
            circle.setAttribute('opacity', '0.85');
            circle.classList.add('region-dot');
            circle.onclick = () => selectBelt(b.id);
            svg.appendChild(circle);

            // Label
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', b.x + 12);
            text.setAttribute('y', b.y + 4);
            text.classList.add('region-label');
            text.textContent = b.name.replace(/产业带$/, '');
            svg.appendChild(text);
        });
    }

    // ============ DETAIL ============
    function selectBelt(id) {
        const belt = industryBelts.find(b => b.id === id);
        if (!belt) return;
        currentBelt = belt;
        renderBeltList(currentFilter === 'all' ? industryBelts : industryBelts.filter(b => b.area === currentFilter));

        const tagsHtml = belt.tags.map(t => {
            const cls = t === '热门' ? 'tag-hot' : t === '出口大户' ? 'tag-export' : 'tag-scale';
            return `<span class="tag ${cls}">${t}</span>`;
        }).join('');

        const productsHtml = belt.products.map(p => `
            <div class="product-card">
                <div class="product-emoji">${p.emoji}</div>
                <div class="product-name">${p.name}</div>
                <div class="product-share">占比 ${p.share}%</div>
                <div class="product-bar"><div class="product-bar-fill" style="width:${p.share}%"></div></div>
            </div>
        `).join('');

        const suppliersHtml = belt.suppliers.map(s => {
            const typeCls = s.type === 'factory' ? 'type-factory' : s.type === 'brand' ? 'type-brand' : 'type-trader';
            const stars = '★'.repeat(Math.floor(s.rating)) + (s.rating % 1 >= 0.5 ? '☆' : '');
            return `
            <tr>
                <td><div class="supplier-name">${s.name}</div><div style="font-size:11px;color:#8899aa;margin-top:2px">${s.products}</div></td>
                <td><span class="supplier-type ${typeCls}">${s.typeLabel}</span></td>
                <td><span class="rating-stars">${stars}</span> <span style="font-size:12px;color:#8899aa">${s.rating}</span></td>
                <td class="capacity">${s.capacity}</td>
                <td style="font-size:12px">${s.moq}</td>
                <td style="font-size:12px;color:#8899aa">${s.contact}</td>
            </tr>`;
        }).join('');

        document.getElementById('detailContent').innerHTML = `
            <div class="fade-in">
                <div class="detail-header">
                    <h3>${belt.icon} ${belt.name}</h3>
                    <div class="detail-tags">${tagsHtml}</div>
                </div>
                <p style="font-size:13px;color:#8899aa;line-height:1.8;margin-bottom:20px">${belt.desc}</p>

                <div style="font-size:14px;font-weight:600;color:#4fc3f7;margin-bottom:12px">主要产品分布</div>
                <div class="product-grid">${productsHtml}</div>

                <div style="font-size:14px;font-weight:600;color:#4fc3f7;margin-bottom:12px">优质供应商</div>
                <table class="supplier-table">
                    <thead><tr><th>供应商</th><th>类型</th><th>评分</th><th>产能</th><th>MOQ</th><th>联系方式</th></tr></thead>
                    <tbody>${suppliersHtml}</tbody>
                </table>
            </div>
        `;
    }

    // ============ BOTTOM CHARTS ============
    function renderRegionBars() {
        const counts = {};
        industryBelts.forEach(b => {
            counts[b.area] = (counts[b.area] || 0) + 1;
        });
        const maxCount = Math.max(...Object.values(counts));
        const colors = ['bar-blue', 'bar-purple', 'bar-green', 'bar-orange', 'bar-blue', 'bar-purple'];
        let i = 0;
        let html = '';
        for (const [area, info] of Object.entries(regionMap)) {
            const count = counts[area] || 0;
            const pct = (count / maxCount * 100).toFixed(0);
            html += `
                <div class="chart-bar-item">
                    <div class="chart-bar-label">${info.name}</div>
                    <div class="chart-bar-track">
                        <div class="chart-bar-fill ${colors[i % colors.length]}" style="width:${pct}%">${count}个</div>
                    </div>
                </div>`;
            i++;
        }
        document.getElementById('regionBars').innerHTML = html;
    }

    function renderPieChart() {
        let factory = 0, brand = 0, trader = 0;
        industryBelts.forEach(b => b.suppliers.forEach(s => {
            if (s.type === 'factory') factory++;
            else if (s.type === 'brand') brand++;
            else trader++;
        }));
        const total = factory + brand + trader;
        const data = [
            { label: '源头工厂', count: factory, color: '#1e90ff' },
            { label: '品牌商', count: brand, color: '#66bb6a' },
            { label: '贸易商', count: trader, color: '#ffa726' }
        ];

        let offset = 0;
        let paths = '';
        data.forEach(d => {
            const pct = d.count / total;
            const large = pct > 0.5 ? 1 : 0;
            const startAngle = offset * 2 * Math.PI;
            const endAngle = (offset + pct) * 2 * Math.PI;
            const x1 = 70 + 60 * Math.sin(startAngle);
            const y1 = 70 - 60 * Math.cos(startAngle);
            const x2 = 70 + 60 * Math.sin(endAngle);
            const y2 = 70 - 60 * Math.cos(endAngle);
            paths += `<path d="M70,70 L${x1},${y1} A60,60 0 ${large},1 ${x2},${y2} Z" fill="${d.color}" opacity="0.85"/>`;
            offset += pct;
        });

        const legendHtml = data.map(d => `
            <div class="pie-legend-item">
                <div class="pie-legend-dot" style="background:${d.color}"></div>
                <span>${d.label}：${d.count}家（${(d.count/total*100).toFixed(0)}%）</span>
            </div>
        `).join('');

        document.getElementById('pieChart').innerHTML = `
            <svg class="pie-svg" viewBox="0 0 140 140">${paths}</svg>
            <div class="pie-legend">${legendHtml}</div>
        `;
    }

    function renderTrendList() {
        const productCounts = {};
        industryBelts.forEach(b => b.products.forEach(p => {
            productCounts[p.name] = (productCounts[p.name] || 0) + p.share;
        }));
        const sorted = Object.entries(productCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);
        const html = sorted.map(([name, score], i) => {
            const rankCls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n';
            return `
                <div class="trend-item">
                    <span class="trend-rank ${rankCls}">${i + 1}</span>
                    <span class="trend-name">${name}</span>
                    <span class="trend-value">热度 ${score}</span>
                </div>`;
        }).join('');
        document.getElementById('trendList').innerHTML = html;
    }

    // Initialize
    init();
    </script>
</body>
</html>
